<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어어휘교육론 AI 튜터</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f4f0;
    --surface: #ffffff;
    --border: #e8e8e2;
    --primary: #3730a3;
    --primary-light: #eef2ff;
    --text: #1a1a2e;
    --text-muted: #6b7280;
    --accent: #059669;
    --error: #dc2626;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 이름 입력 화면 */
  #access-screen {
    position: fixed; inset: 0; z-index: 100;
    background: #1a1a2e;
    display: flex; align-items: center; justify-content: center; padding: 1.5rem;
  }

  #name-screen {
    position: fixed; inset: 0; z-index: 100;
    background: #1a1a2e;
    display: flex; align-items: center; justify-content: center; padding: 1.5rem;
  }
  .name-card {
    background: var(--surface);
    border-radius: 2rem;
    padding: 3rem 2.5rem;
    width: 100%; max-width: 380px;
    text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }
  .name-card .icon {
    width: 56px; height: 56px;
    background: var(--primary-light);
    border-radius: 1rem;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem;
    font-size: 1.8rem;
  }
  .name-card h1 { font-size: 1.4rem; font-weight: 900; color: var(--text); margin-bottom: 0.3rem; }
  .name-card p { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 2rem; }
  .name-card label { display: block; text-align: left; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
  .name-card input {
    width: 100%; padding: 1rem;
    border: 2px solid var(--border); border-radius: 1rem;
    font-family: inherit; font-size: 1rem; font-weight: 700;
    text-align: center; outline: none;
    transition: border-color 0.2s;
  }
  .name-card input:focus { border-color: var(--primary); }
  .name-card .error { font-size: 0.75rem; color: var(--error); margin-top: 0.4rem; min-height: 1rem; }
  .name-card button {
    width: 100%; margin-top: 1.5rem;
    padding: 1rem; border: none; border-radius: 1rem;
    background: var(--primary); color: white;
    font-family: inherit; font-size: 1rem; font-weight: 900;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
  }
  .name-card button:hover { background: #312e81; }
  .name-card button:active { transform: scale(0.98); }

  /* 관리자 인증 모달 */
  #admin-modal {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(26,26,46,0.85); backdrop-filter: blur(8px);
    align-items: center; justify-content: center; padding: 1.5rem;
  }
  #admin-modal.show { display: flex; }
  .admin-card {
    background: var(--surface); border-radius: 2rem;
    padding: 2.5rem; width: 100%; max-width: 340px; text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }
  .admin-card h2 { font-size: 1.2rem; font-weight: 900; margin-bottom: 1.5rem; }
  .admin-card input {
    width: 100%; padding: 1rem; border: 2px solid var(--border); border-radius: 1rem;
    font-family: 'DM Mono', monospace; font-size: 1.5rem; font-weight: 500;
    text-align: center; outline: none; letter-spacing: 0.3em;
    transition: border-color 0.2s;
  }
  .admin-card input:focus { border-color: var(--primary); }
  .admin-buttons { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
  .admin-buttons button {
    flex: 1; padding: 0.875rem; border: none; border-radius: 1rem;
    font-family: inherit; font-size: 0.875rem; font-weight: 700; cursor: pointer;
  }
  .btn-cancel { background: var(--border); color: var(--text); }
  .btn-confirm { background: var(--primary); color: white; }

  /* 헤더 */
  header {
    background: #1a1a2e; color: white;
    padding: 1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 0.75rem; }
  .header-logo { font-size: 1.3rem; }
  .header-title { font-size: 1rem; font-weight: 900; }
  .header-right { display: flex; align-items: center; gap: 0.75rem; }
  .user-badge {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.8rem; color: #a5b4fc; font-weight: 700;
  }
  .admin-btn {
    padding: 0.4rem 0.7rem; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 0.5rem; background: transparent; color: #9ca3af;
    cursor: pointer; font-size: 0.75rem; transition: background 0.2s;
  }
  .admin-btn:hover { background: rgba(255,255,255,0.1); }

  /* 메인 채팅 */
  main {
    flex: 1; overflow: hidden;
    display: flex; flex-direction: column;
    padding: 1rem; max-width: 900px; width: 100%; margin: 0 auto;
  }
  .chat-container {
    flex: 1; display: flex; flex-direction: column;
    background: var(--surface); border-radius: 1.5rem;
    border: 1px solid var(--border); box-shadow: var(--shadow);
    overflow: hidden;
  }
  .messages {
    flex: 1; overflow-y: auto; padding: 1.5rem;
    display: flex; flex-direction: column; gap: 1.5rem;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* 메시지 버블 */
  .msg { display: flex; }
  .msg.user { justify-content: flex-end; }
  .msg.assistant { justify-content: flex-start; }
  .bubble {
    max-width: 85%; border-radius: 1.25rem; padding: 1.25rem 1.5rem;
    font-size: 0.9rem; line-height: 1.7;
  }
  .msg.user .bubble {
    background: var(--primary); color: white;
    box-shadow: 0 4px 16px rgba(55,48,163,0.25);
  }
  .msg.assistant .bubble {
    background: #f8f8f6; border: 1px solid var(--border); color: var(--text);
  }
  .bubble-label {
    font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; opacity: 0.5; margin-bottom: 0.5rem;
  }
  .msg.user .bubble-label { text-align: right; }

  /* 구조화된 답변 스타일 */
  .line-concept { font-size: 1rem; font-weight: 900; color: var(--primary); margin-bottom: 0.5rem; }
  .line-explain { font-weight: 700; color: var(--text); margin-top: 1rem; margin-bottom: 0.25rem; }
  .line-example { font-weight: 700; color: var(--accent); margin-top: 1rem; margin-bottom: 0.25rem; }
  .line-source {
    font-size: 0.72rem; font-weight: 700; color: var(--text-muted);
    margin-top: 1rem; padding-top: 0.75rem;
    border-top: 1px solid var(--border); font-style: italic;
  }
  .line-summary { font-weight: 900; margin-top: 1.5rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
  .line-summary::before { content: ''; display: block; width: 3px; height: 1rem; background: var(--primary); border-radius: 2px; flex-shrink: 0; }
  .line-bullet { margin-left: 1rem; margin-bottom: 0.35rem; display: flex; gap: 0.5rem; font-size: 0.85rem; }
  .line-bullet::before { content: '#'; color: var(--primary); font-weight: 700; flex-shrink: 0; }
  .line-plain { margin-bottom: 0.25rem; }

  /* 로딩 */
  .loading {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.75rem; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em; padding: 0.5rem;
  }
  .spinner {
    width: 14px; height: 14px; border: 2px solid var(--border);
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 입력창 */
  .input-area {
    padding: 1rem 1.25rem;
    background: rgba(244,244,240,0.5);
    border-top: 1px solid var(--border);
  }
  .input-wrap { position: relative; max-width: 100%; }
  .input-wrap input {
    width: 100%; padding: 0.875rem 3.5rem 0.875rem 1.25rem;
    border: 2px solid var(--border); border-radius: 2rem;
    font-family: inherit; font-size: 0.9rem; font-weight: 500;
    outline: none; background: white; transition: border-color 0.2s;
  }
  .input-wrap input:focus { border-color: var(--primary); }
  .input-wrap input:disabled { background: var(--bg); }
  .send-btn {
    position: absolute; right: 0.4rem; top: 50%; transform: translateY(-50%);
    width: 38px; height: 38px; border: none; border-radius: 50%;
    background: var(--primary); color: white;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
  }
  .send-btn:hover { background: #312e81; }
  .send-btn:active { transform: translateY(-50%) scale(0.93); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }

  /* 관리자 화면 */
  #admin-screen {
    display: none; flex-direction: column; height: 100%;
  }
  #admin-screen.show { display: flex; }
  .admin-header {
    background: #1a1a2e; color: white;
    padding: 1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .admin-header h1 { font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
  .back-btn {
    padding: 0.4rem 0.875rem; border: none; border-radius: 0.5rem;
    background: var(--primary); color: white;
    font-family: inherit; font-size: 0.75rem; font-weight: 700; cursor: pointer;
  }
  .admin-body { flex: 1; overflow-y: auto; padding: 1.5rem; }
  .log-table-wrap {
    background: white; border-radius: 1rem;
    border: 1px solid var(--border); overflow: hidden;
    box-shadow: var(--shadow);
  }
  .log-table-header {
    padding: 0.875rem 1.5rem;
    background: #f8f8f6; border-bottom: 1px solid var(--border);
    font-size: 0.7rem; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  thead { background: #f8f8f6; }
  th {
    padding: 0.75rem 1rem; text-align: left;
    font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 0.875rem 1rem; border-bottom: 1px solid #f0f0ec; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafaf8; }
  .td-time { color: var(--text-muted); white-space: nowrap; width: 140px; }
  .td-name { font-weight: 700; color: var(--primary); width: 100px; }
  .td-q { font-weight: 700; width: 200px; }
  .td-a { color: #374151; line-height: 1.6; white-space: pre-wrap; max-width: 400px; }
  .empty-row td { text-align: center; padding: 3rem; color: var(--text-muted); }
</style>
</head>
<body>

<!-- 이름 입력 화면 -->
<div id="access-screen">
  <div class="name-card">
    <div class="icon">🔑</div>
    <h1>한국어어휘교육론</h1>
    <p>수업 참여 코드를 입력하세요</p>
    <label for="access-input">참여 코드</label>
    <input type="password" id="access-input" placeholder="••••••••" autocomplete="off">
    <div class="error" id="access-error"></div>
    <button onclick="confirmAccess()">입력</button>
  </div>
</div>

<div id="name-screen" style="display:none;">
  <div class="name-card">
    <div class="icon">🎓</div>
    <h1>한국어어휘교육론</h1>
    <p>AI 학습 튜터</p>
    <label for="name-input">이름</label>
    <input type="text" id="name-input" placeholder="홍길동" autocomplete="off">
    <div class="error" id="name-error"></div>
    <button onclick="confirmName()">시작하기</button>
  </div>
</div>

<!-- 관리자 인증 모달 -->
<div id="admin-modal">
  <div class="admin-card">
    <h2>🔐 관리자 인증</h2>
    <input type="password" id="admin-pw-input" placeholder="••••" maxlength="10">
    <div class="admin-buttons">
      <button class="btn-cancel" onclick="closeAdminModal()">닫기</button>
      <button class="btn-confirm" onclick="confirmAdmin()">확인</button>
    </div>
  </div>
</div>

<!-- 채팅 화면 -->
<div id="chat-screen" style="display:none; flex-direction:column; height:100%;">
  <header>
    <div class="header-left">
      <span class="header-logo">🎓</span>
      <span class="header-title">한국어어휘교육론 AI 튜터</span>
    </div>
    <div class="header-right">
      <div class="user-badge">
        <span>👤</span>
        <span id="display-name"></span>
      </div>
      <button class="admin-btn" onclick="openAdminModal()">🔒</button>
    </div>
  </header>
  <main>
    <div class="chat-container">
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <div class="input-wrap">
          <input type="text" id="chat-input" placeholder="질문 내용을 입력하세요...">
          <button class="send-btn" id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- 관리자 화면 -->
<div id="admin-screen">
  <div class="admin-header">
    <h1>✅ 학생 질문 기록 관리</h1>
    <button class="back-btn" onclick="exitAdmin()">채팅 화면으로</button>
  </div>
  <div class="admin-body">
    <div class="log-table-wrap">
      <div class="log-table-header">질문 로그 — 구글 시트에 실시간 저장됨</div>
      <table>
        <thead>
          <tr>
            <th>시간</th>
            <th>이름</th>
            <th>질문</th>
            <th>답변</th>
          </tr>
        </thead>
        <tbody id="log-tbody">
          <tr class="empty-row"><td colspan="4">아직 질문 기록이 없습니다.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const GEMINI_API_KEY = 'AIzaSyDqxRlSIVFTj0cE1qvugX5s8pYyOHvqSzQ';
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzAz75aFVvLfVJBmHUCCkANNoFZQ9AE3lBhXhMALSsdOvdrKfNhyvRwYyONgZLqPv8_/exec';
  const ADMIN_PASSWORD = '0645';
  const ACCESS_PASSWORD = '2026KLE';

  const SYSTEM_PROMPT = `당신은 한국어어휘교육론 학습 튜터입니다. 업로드된 교재를 기반으로 답변하세요.

[핵심 지침 - 절대 준수]
1. 강조 기호 사용 절대 금지: 답변 내용에서 별표(**), 언더바(_), 샵(#) 등의 마크다운 강조 기호를 절대로 사용하지 마십시오. 모든 텍스트는 기호 없이 평문으로만 작성하십시오.
2. 답변 구조:
   개념: 용어 명칭
   설명: 상세한 내용
   간단한 예시: 한국어 교육 현장 예시
   출처: 교재명과 해당 내용이 나오는 구체적인 챕터(Chapter) 번호
3. 출처 표시 예: [출처: Learning Vocabulary in Another Language, Chapter 3] 혹은 [출처: 한국어어휘교육론, 제4장]
4. 범위 외 질문: 교재에 없는 내용이면 "이 질문은 교재에서 직접 다루지 않는 내용일 수 있습니다."라고 서두에 언급하십시오.
5. 핵심 정리: 마지막에 불렛 포인트(-)를 사용하여 요약하되, 강조 기호는 사용하지 마십시오.`;

  let studentName = '';
  let chatHistory = [];
  let localLogs = [];
  let isLoading = false;

  const WELCOME = '안녕하세요! 한국어어휘교육론 학습 튜터입니다.\n\nNation의 외국어 어휘 교수와 학습과 한국어어휘교육론 교재에 기반하여 답변을 드립니다.\n\n\n(필독) 챗봇 이용 수칙\n\n1. 챗봇은 지정된 두 권의 교재 내용만을 근거로 답변합니다. 교재 이외의 일반 상식이나 외부 자료는 반영하지 않습니다.\n\n2. 답변 마지막에는 항상 참고한 도서와 해당 챕터 또는 페이지가 명시됩니다. 답변의 근거가 궁금할 때 원문을 꼭 찾아보세요.\n\n3. 교재 내에 정보가 없는 질문을 하면 답변이 거부될 수 있습니다. 수업 내용과 관련된 질문을 해 주세요.';

  // 수업 참여 코드 확인
  document.getElementById('access-input').addEventListener('keypress', e => { if (e.key === 'Enter') confirmAccess(); });

  function confirmAccess() {
    const val = document.getElementById('access-input').value.trim();
    if (val !== ACCESS_PASSWORD) {
      document.getElementById('access-error').textContent = '참여 코드가 올바르지 않습니다.';
      document.getElementById('access-input').value = '';
      return;
    }
    document.getElementById('access-screen').style.display = 'none';
    document.getElementById('name-screen').style.display = 'flex';
    setTimeout(() => document.getElementById('name-input').focus(), 100);
  }

  // 이름 입력
  document.getElementById('name-input').addEventListener('keypress', e => { if (e.key === 'Enter') confirmName(); });

  function confirmName() {
    const val = document.getElementById('name-input').value.trim();
    if (!val) { document.getElementById('name-error').textContent = '이름을 입력해 주세요.'; return; }
    studentName = val;
    document.getElementById('display-name').textContent = val;
    document.getElementById('name-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    appendMessage('assistant', WELCOME);
    document.getElementById('chat-input').focus();
  }

  // 메시지 렌더링
  function renderContent(text, isUser) {
    if (isUser) return `<div class="line-plain">${escHtml(text)}</div>`;
    const lines = text.split('\n');
    return lines.map(line => {
      if (line.startsWith('개념:')) return `<div class="line-concept">${escHtml(line)}</div>`;
      if (line.startsWith('설명:')) return `<div class="line-explain">${escHtml(line)}</div>`;
      if (line.startsWith('간단한 예시:')) return `<div class="line-example">${escHtml(line)}</div>`;
      if (line.startsWith('출처:')) return `<div class="line-source">${escHtml(line)}</div>`;
      if (line.startsWith('핵심 정리')) return `<div class="line-summary">${escHtml(line)}</div>`;
      if (line.startsWith('- ')) return `<div class="line-bullet">${escHtml(line.substring(2))}</div>`;
      return `<div class="line-plain">${escHtml(line)}</div>`;
    }).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function appendMessage(role, content) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="bubble">
        <div class="bubble-label">${role === 'user' ? escHtml(studentName) : 'ACADEMIC TUTOR'}</div>
        ${renderContent(content, role === 'user')}
      </div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function showLoading() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.id = 'loading-indicator';
    div.className = 'loading';
    div.innerHTML = '<div class="spinner"></div> 교재 정보를 분석하는 중...';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideLoading() {
    const el = document.getElementById('loading-indicator');
    if (el) el.remove();
  }

  // 메시지 전송
  document.getElementById('chat-input').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const query = input.value.trim();
    if (!query || isLoading) return;

    input.value = '';
    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    input.disabled = true;

    appendMessage('user', query);
    showLoading();

    chatHistory.push({ role: 'user', parts: [{ text: query }] });

    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [
              { role: 'user', parts: [{ text: `System Instruction: ${SYSTEM_PROMPT}` }] },
              ...chatHistory.slice(-6)
            ]
          })
        }
      );
      const data = await res.json();
      let text = data.candidates?.[0]?.content?.parts?.[0]?.text || '답변을 생성할 수 없습니다.';
      text = text.replace(/\*\*/g, '').replace(/__/g, '').replace(/###/g, '');

      hideLoading();
      appendMessage('assistant', text);
      chatHistory.push({ role: 'model', parts: [{ text }] });

      // 구글 시트 저장
      saveToSheet(studentName, query, text);

      // 로컬 로그
      localLogs.push({ time: new Date().toLocaleString('ko-KR'), name: studentName, question: query, answer: text });

    } catch (e) {
      hideLoading();
      appendMessage('assistant', '연결 오류가 발생했습니다. 다시 시도해 주세요.');
    } finally {
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
      input.disabled = false;
      input.focus();
    }
  }

  async function saveToSheet(name, question, answer) {
    try {
      await fetch(SHEET_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ timestamp: new Date().toLocaleString('ko-KR'), name, question, answer })
      });
    } catch (e) { console.error('시트 저장 실패:', e); }
  }

  // 관리자
  function openAdminModal() {
    document.getElementById('admin-modal').classList.add('show');
    document.getElementById('admin-pw-input').value = '';
    setTimeout(() => document.getElementById('admin-pw-input').focus(), 100);
  }
  function closeAdminModal() {
    document.getElementById('admin-modal').classList.remove('show');
  }
  document.getElementById('admin-pw-input').addEventListener('keypress', e => { if (e.key === 'Enter') confirmAdmin(); });

  function confirmAdmin() {
    if (document.getElementById('admin-pw-input').value === ADMIN_PASSWORD) {
      closeAdminModal();
      document.getElementById('chat-screen').style.display = 'none';
      const screen = document.getElementById('admin-screen');
      screen.classList.add('show');
      renderLogs();
    } else {
      alert('비밀번호가 틀렸습니다.');
    }
  }

  function exitAdmin() {
    document.getElementById('admin-screen').classList.remove('show');
    document.getElementById('chat-screen').style.display = 'flex';
  }

  function renderLogs() {
    const tbody = document.getElementById('log-tbody');
    if (localLogs.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="4">아직 질문 기록이 없습니다.<br><small style="color:#9ca3af">구글 시트에서 전체 기록을 확인하세요.</small></td></tr>';
      return;
    }
    tbody.innerHTML = [...localLogs].reverse().map(log => `
      <tr>
        <td class="td-time">${log.time}</td>
        <td class="td-name">${escHtml(log.name)}</td>
        <td class="td-q">${escHtml(log.question)}</td>
        <td class="td-a">${escHtml(log.answer)}</td>
      </tr>
    `).join('');
  }
</script>
</body>
</html>
